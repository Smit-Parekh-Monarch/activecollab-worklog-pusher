<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Work-log Pusher · Monarch</title>
<link rel="stylesheet" href="styles.css" />
<script type="module" src="https://cdn.jsdelivr.net/npm/ionicons@7.4.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://cdn.jsdelivr.net/npm/ionicons@7.4.0/dist/ionicons/ionicons.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body class="single">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ---------- helpers ---------- */
function parseHours(v) {
  if (typeof v === 'number') return v;
  if (typeof v === 'string') {
    if (v.includes(':')) { const [h, m] = v.split(':').map(Number); return +(h + (m||0)/60).toFixed(2); }
    return parseFloat(v) || 0;
  }
  return 0;
}
const MONS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function fmtDate(iso) {
  if (!iso || !/^\d{4}-\d{2}-\d{2}/.test(iso)) return 'Unknown date';
  const [y,m,d] = iso.slice(0,10).split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return DAYS[dt.getDay()] + ', ' + d + ' ' + MONS[m-1] + ' ' + y;
}
function relTime(ms) {
  if (!ms) return '';
  const s = Math.round((Date.now()-ms)/1000);
  if (s < 60) return 'just now';
  const m = Math.round(s/60); if (m < 60) return m+'m ago';
  const h = Math.round(m/60); if (h < 24) return h+'h ago';
  return Math.round(h/24)+'d ago';
}
function todayISO() {
  const d = new Date(), p = n => String(n).padStart(2,'0');
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate());
}
function isTodayFile(w, today) {
  if (w.date && w.date.slice(0,10) === today) return true;
  const [y,m,d] = today.split('-').map(Number);
  const name = (w.rel||'').split('/').pop().replace(/\.json$/i,'');
  return name === d+'-'+m+'-'+y;
}

const LS_KEY = 'ac_pusher_v2';
function loadLS() {
  try {
    const cur = JSON.parse(localStorage.getItem(LS_KEY)||'{}');
    if (cur && (cur.cookie||cur.csrf)) return cur;
    // migrate from old key
    const old = JSON.parse(localStorage.getItem('ac_pusher_state_v1')||'{}');
    if (old && old.parsed && (old.parsed.cookie||old.parsed.csrf)) {
      const migrated = { curl:old.curl||'', base:old.base||'', userId:old.userId||'748', projectId:old.projectId||'6070', taskListId:old.taskListId||'32330', cookie:old.parsed.cookie||'', csrf:old.parsed.csrf||'', capturedAt:null };
      saveLS(migrated); return migrated;
    }
    return cur;
  } catch { return {}; }
}
function saveLS(obj) { try { localStorage.setItem(LS_KEY, JSON.stringify(obj)); } catch {} }

const PROMPT = [
  'Turn the work I describe below into a work-log JSON for my ActiveCollab Work-log Pusher.',
  '',
  'Output ONLY a valid JSON array — one object per task — in EXACTLY this shape:',
  '[',
  '  {',
  '    "name": "Short task title",',
  '    "date": "YYYY-MM-DD",',
  '    "hours": "HH:MM",',
  '    "body": "Short one-line label for the task",',
  '    "summary": "- bullet of what was done\\n- another bullet"',
  '  }',
  ']',
  '',
  'My work and hours:',
  '(describe your tasks, the date, and how many hours each took)',
].join('\n');

const SAMPLE_CURL = `curl 'http://192.168.200.198/activecollab/api/v1/projects/6070/tasks' -H 'X-Angie-CsrfValidator: 8f2a1c9d4e6b7a0f' -b 'sessionid=abc; activecollab_csrf_validator_for_6070=8f2a1c9d4e6b7a0f' --data-raw '{"task_list_id":32329,"name":"Test","user_id":748}'`;

// Selectable task lists (shown as "Project" in the UI)
const PROJECTS = [
  { id: '32329', label: 'MIPL' },
  { id: '32330', label: 'Monarch Website' },
];
const DEFAULT_TASK_LIST = '32329'; // MIPL

/* ---------- main app ---------- */
function App() {
  const ls = loadLS();

  // session
  const [curl, setCurl]           = useState(ls.curl || '');
  const [base, setBase]           = useState(ls.base || 'http://192.168.200.198/activecollab/api/v1');
  const [userId, setUserId]       = useState(ls.userId || '748');
  const [projectId, setProjectId] = useState(ls.projectId || '6070');
  const [taskListId, setTaskListId] = useState(ls.taskListId || DEFAULT_TASK_LIST);
  const [parsed, setParsed]       = useState({ cookie: ls.cookie||'', csrf: ls.csrf||'' });
  const [capturedAt, setCapturedAt] = useState(ls.capturedAt || null);
  const connected = !!(parsed.cookie && parsed.csrf);

  // worklogs
  const [worklogs, setWorklogs]   = useState([]);
  const [selectedRel, setSelectedRel] = useState('');
  const [jsonText, setJsonText]   = useState('');
  const [tasks, setTasks]         = useState([]);
  const [showReview, setShowReview] = useState(false);
  // (pushed flag now lives in the JSON file itself — no separate state needed)

  // push
  const [status, setStatus]       = useState({});
  const [pushing, setPushing]     = useState(false);
  const [progress, setProgress]   = useState(0);
  const cancelRef                 = useRef(false);

  // ui
  const [toasts, setToasts]       = useState([]);
  const [modal, setModal]         = useState(null);
  const resolverRef               = useRef(null);

  /* -- persist -- */
  function persist(patch) {
    const next = { ...loadLS(), curl, base, userId, projectId, taskListId, cookie: parsed.cookie, csrf: parsed.csrf, capturedAt, ...patch };
    saveLS(next);
  }

  /* -- toast -- */
  const toast = useCallback((msg, type='info') => {
    const id = Math.random().toString(36).slice(2);
    setToasts(ts => [...ts, {id, msg, type}]);
    setTimeout(() => setToasts(ts => ts.filter(x => x.id !== id)), 2800);
  }, []);

  /* -- confirm modal -- */
  const confirm = useCallback(data => new Promise(res => { resolverRef.current = res; setModal(data); }), []);
  const closeModal = v => { setModal(null); if (resolverRef.current) { resolverRef.current(v); resolverRef.current = null; } };

  /* -- curl parse -- */
  function grabQuoted(s, flag) {
    let m = s.match(new RegExp(flag+"\\s+'([^']*)'"));  if (m) return m[1];
    m = s.match(new RegExp(flag+'\\s+"((?:[^"\\\\]|\\\\.)*)"')); if (m) return m[1].replace(/\\"/g,'"');
    return '';
  }
  function doParse(opts={}) {
    const c = curl.trim();
    if (!c) { if (!opts.silent) toast('Paste a cURL command first','err'); return; }
    const url = (c.match(/(https?:\/\/[^\s'"]+)/)||[])[1]||'';
    const pid = (url.match(/\/projects\/(\d+)/)||c.match(/\/projects\/(\d+)/)||[])[1]||'';
    let b = (url.match(/^(https?:\/\/.*\/api\/v\d+)/)||[])[1]||'';
    if (!b) b = (url.match(/^(https?:\/\/.*?)\/projects\//)||[])[1]||'';
    const cookie = grabQuoted(c,'(?:-b|--cookie)');
    const csrf = ((c.match(/X-Angie-CsrfValidator:\s*([^'"\n]+)/)||[])[1]||'').trim();
    const tlid = (c.match(/"task_list_id"\s*:\s*(\d+)/)||[])[1]||'';
    const uid  = (c.match(/"user_id"\s*:\s*(\d+)/)||[])[1]||'';
    if (b) setBase(b); if (pid) setProjectId(pid); if (tlid) setTaskListId(tlid); if (uid) setUserId(uid);
    const now = Date.now();
    setParsed({cookie, csrf}); setCapturedAt(now);
    persist({curl:c, base:b||base, userId:uid||userId, projectId:pid||projectId, taskListId:tlid||taskListId, cookie, csrf, capturedAt:now});
    const missing = [];
    if (!cookie) missing.push('cookie');
    if (!csrf)   missing.push('CSRF token');
    if (missing.length) { if (!opts.silent) toast('Missing '+missing.join(' & ')+' — check the cURL','err'); }
    else toast('Session captured ✓','ok');
  }

  // auto-parse & store as soon as a cURL is pasted/typed (no Parse click needed)
  const autoRef = useRef(null);
  useEffect(() => {
    clearTimeout(autoRef.current);
    // short debounce so a paste captures the session almost immediately
    if (curl.trim()) autoRef.current = setTimeout(() => doParse({silent:true}), 120);
  }, [curl]);

  /* -- load worklogs from server -- */
  const lastKeyRef = useRef('');
  const autoSelectedRef = useRef(false);

  async function fetchWorklogs(force=false) {
    try {
      const r = await fetch('/api/worklogs');
      const data = await r.json();
      const key = (data.files||[]).map(f=>f.rel+':'+Math.round(f.mtime)).join('|');
      if (!force && key === lastKeyRef.current) return;
      lastKeyRef.current = key;
      // normalize to the shape the UI expects
      const wls = (data.files||[]).map(f => ({
        rel: f.rel, date: f.date||null, valid: f.valid !== false,
        mtime: f.mtime, tasks: [], loaded: false,
        count: f.count||0, hours: f.hours||0, pushed: f.pushed||false,
      }));
      setWorklogs(wls);
      // auto-select today on first load only
      if (!autoSelectedRef.current) {
        autoSelectedRef.current = true;
        const today = todayISO();
        const match = wls.find(w => isTodayFile(w, today));
        if (match) pickFile(match);
      }
    } catch {}
  }

  useEffect(() => {
    fetchWorklogs(true);
    // SSE real-time updates
    try {
      const es = new EventSource('/api/events');
      es.addEventListener('worklogs', () => fetchWorklogs(true));
      es.addEventListener('reload',   () => location.reload());
      return () => es.close();
    } catch {}
  }, []);

  useEffect(() => {
    const id = setInterval(() => fetchWorklogs(false), 15000);
    const onFocus = () => fetchWorklogs(false);
    window.addEventListener('focus', onFocus);
    return () => { clearInterval(id); window.removeEventListener('focus', onFocus); };
  }, []);

  /* -- pick / load a file -- */
  async function pickFile(w) {
    if (!w.valid) { toast('That file has invalid JSON','err'); return; }
    setSelectedRel(w.rel);
    try {
      const r = await fetch('/api/worklog?path='+encodeURIComponent(w.rel));
      const txt = await r.text();
      if (!r.ok) { toast('Load failed','err'); return; }
      setJsonText(txt);
      const json = JSON.parse(txt);
      loadTasks(Array.isArray(json) ? json : (json.tasks||[]));
    } catch(e) { toast('Could not load file','err'); }
  }

  function loadTasks(arr) {
    setTasks(arr.map(t => ({
      name: t.name||t.title||'', date: t.date||t.record_date||'',
      hours: parseHours(t.hours??t.duration??t.time??0),
      summary: t.summary||'', body: t.body||t.description||'',
    })));
    setStatus({}); setProgress(0); setShowReview(true);
  }

  function previewJson() {
    let json; try { json = JSON.parse(jsonText); } catch(e) { toast('Invalid JSON: '+e.message,'err'); return; }
    const arr = Array.isArray(json) ? json : (json.tasks||[]);
    if (!arr.length) { toast('No tasks found','err'); return; }
    setSelectedRel(''); loadTasks(arr);
    toast(arr.length+' task'+(arr.length>1?'s':'')+' ready','ok');
  }

  function editCell(i,f,v) { setTasks(ts => ts.map((t,idx) => idx===i ? {...t,[f]: f==='hours'?parseHours(v):v} : t)); }
  function removeRow(i) {
    setTasks(ts => ts.filter((_,idx) => idx!==i));
    setStatus(s => { const n={}; Object.keys(s).forEach(k=>{const ki=+k; if(ki<i) n[ki]=s[ki]; else if(ki>i) n[ki-1]=s[ki];}); return n; });
  }
  function addRow() { setTasks(ts => [...ts, {name:'', date:tasks[0]?.date||todayISO(), hours:0, summary:'', body:''}]); }

  // mark a file as pushed — writes pushed:true into the JSON on disk, updates local state
  async function markFileDone(rel) {
    if (!rel) return;
    try {
      await fetch('/api/worklog/mark-pushed?path='+encodeURIComponent(rel), {method:'POST'});
      // update local worklogs state so badge appears immediately without a reload
      setWorklogs(ws => ws.map(w => w.rel===rel ? {...w, pushed:true} : w));
    } catch {}
  }

  const totalHours = tasks.reduce((s,t) => s+(Number(t.hours)||0), 0);
  function fmtTotal(dec) {
    const total = Math.round(dec * 60);
    const h = Math.floor(total/60), m = total%60;
    return h+'h'+(m?' '+m+'m':'');
  }
  const allDone    = tasks.length>0 && tasks.every((_,i) => (status[i]||{}).complete==='ok');

  /* -- real push -- */
  async function runPush(indices) {
    if (!connected) { toast('Parse a valid cURL first','err'); return; }
    const items = indices.map(i => tasks[i]);
    const ok = await confirm({
      title: indices.length===1 ? 'Push this task?' : `Push ${indices.length} tasks?`,
      body: `For <b>each</b> task this creates it, logs its hours, then marks it complete in ActiveCollab.`,
      items, ok: 'Push to ActiveCollab',
    });
    if (!ok) return;

    setPushing(true); cancelRef.current = false;
    const isAll = indices.length === tasks.length;
    if (isAll) setProgress(0);
    setStatus(s => { const n={...s}; indices.forEach(i => n[i]={create:'',time:'',complete:''}); return n; });
    const setStep = (i,step,val) => setStatus(s => ({...s,[i]:{...s[i],[step]:val}}));

    const cfg = {
      base, projectId, taskListId,
      cookie: parsed.cookie, csrf: parsed.csrf,
      userId,
      tasks: items,
    };

    try {
      const res = await fetch('/api/push', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(cfg)});
      const reader = res.body.getReader();
      const dec = new TextDecoder();
      let buf = '', done2 = 0;
      while (true) {
        const {value, done} = await reader.read();
        if (done) break;
        buf += dec.decode(value, {stream:true});
        let nl;
        while ((nl=buf.indexOf('\n')) !== -1) {
          const line = buf.slice(0,nl).trim(); buf = buf.slice(nl+1);
          if (!line) continue;
          const ev = JSON.parse(line);
          if (ev.done) { if(ev.error) toast(ev.error,'err'); continue; }
          if (cancelRef.current) break;
          // map sent-index → real table index
          const ri = indices[ev.idx];
          if (ev.step === 'fatal') { setStep(ri,'create','err'); continue; }
          if (ev.status === 'start') setStep(ri,ev.step,'run');
          else if (ev.status === 'ok') {
            setStep(ri,ev.step,'ok');
            if (ev.step==='complete') { done2++; if(isAll) setProgress(Math.round((done2/indices.length)*100)); }
          }
          else if (ev.status === 'error') setStep(ri,ev.step,'err');
        }
      }
      if (!cancelRef.current) {
        toast(indices.length===1?'Task pushed ✓':`${indices.length} tasks pushed ✓`,'ok');
        // if we just pushed ALL tasks for the selected file, mark it done
        if (isAll && selectedRel) markFileDone(selectedRel);
      }
    } catch(e) {
      toast('Push failed: '+e.message,'err');
    } finally {
      setPushing(false);
    }
  }

  function cancelPush() { cancelRef.current=true; setPushing(false); toast('Push stopped','info'); }

  const overall = i => {
    const s = status[i];
    if (!s) return 'wait';
    if (s.create==='err'||s.time==='err'||s.complete==='err') return 'err';
    if (s.complete==='ok') return 'ok';
    if (s.create||s.time||s.complete) return 'run';
    return 'wait';
  };
  const pmeta = {
    ok:   {l:'done',    i:'checkmark-circle'},
    err:  {l:'error',   i:'close-circle'},
    run:  {l:'working', i:'sync-outline'},
    wait: {l:'waiting', i:'ellipse-outline'},
  };

  // group worklogs by month/week
  const groups = {};
  worklogs.forEach(w => {
    const p = w.rel.split('/');
    const g = p.length>=2 ? (p[0][0].toUpperCase()+p[0].slice(1))+' · '+p[1].replace(/^week-?/i,'Week ') : 'Files';
    (groups[g]=groups[g]||[]).push(w);
  });

  const authChips = [
    {label:'Cookie',               ok:!!parsed.cookie},
    {label:'CSRF token',           ok:!!parsed.csrf},
    {label:'Project #'+(projectId||'—'), ok:!!projectId},
    {label:'Task list #'+(taskListId||'—'), ok:!!taskListId},
  ];

  return (
    <div className="sp-wrap">
      {/* header */}
      <header className="sp-head">
        <div className="sp-brand">
          <div className="sp-logo">
            <ion-icon name="cloud-upload-outline" style={{fontSize:24,color:'#0E7490'}}></ion-icon>
          </div>
          <div>
            <h1>Work-log Pusher</h1>
            <p>Monarch Innovation</p>
          </div>
        </div>
        <div className="sp-head-right">
          <span className={'sp-conn '+(connected?'on':'off')}>
            <span className="sp-dot"></span>
            {connected ? 'Session active'+(capturedAt?' · '+relTime(capturedAt):'') : 'Not connected'}
          </span>
          <a className="btn btn-ghost" href="/figma" target="_blank" rel="noopener">
            <ion-icon name="color-palette-outline"></ion-icon>Figma changes
          </a>
        </div>
      </header>

      <p className="sp-lede">Turn the work-log JSON into ActiveCollab entries in one go. For each task it <b>creates the task</b>, <b>logs the hours</b>, then <b>marks it complete</b>.</p>

      <div className="sp-flow">
        <ion-icon name="link-outline"></ion-icon>
        <span>Paste <b>cURL</b></span>
        <ion-icon name="chevron-forward-outline" className="ar"></ion-icon>
        <span>Pick / paste <b>JSON</b></span>
        <ion-icon name="chevron-forward-outline" className="ar"></ion-icon>
        <span>Review</span>
        <ion-icon name="chevron-forward-outline" className="ar"></ion-icon>
        <span><b>Push</b></span>
      </div>

      {/* steps 1 + 2 */}
      <div className="sp-grid">

        {/* STEP 1 — Connect session */}
        <section className="card card-pad">
          <div className="sp-cardhead"><span className="sp-no">1</span><h2>Connect session</h2></div>
          <p className="sp-sub">
            In ActiveCollab → DevTools → Network, find a <code>POST …/tasks</code> request,
            right-click → <b>Copy as cURL</b>, then paste it below. Auto-parsed &amp; saved across refreshes.
          </p>
          <textarea rows={6} value={curl} spellCheck={false}
            onChange={e=>{setCurl(e.target.value); persist({curl:e.target.value});}}
            placeholder={"curl 'http://…/projects/6070/tasks' -H 'X-Angie-CsrfValidator: …' -b '…' --data-raw '{…}'"} />
          <div className="field-grid" style={{marginTop:12}}>
            <div>
              <label className="fld">Project</label>
              <select className="inp mono-inp" value={PROJECTS.some(p=>p.id===taskListId) ? taskListId : ''}
                onChange={e=>{const v=e.target.value; if(v){ setTaskListId(v); persist({taskListId:v}); }}}>
                {!PROJECTS.some(p=>p.id===taskListId) && <option value="">Custom (#{taskListId||'—'})</option>}
                {PROJECTS.map(p => <option key={p.id} value={p.id}>{p.label} — #{p.id}</option>)}
              </select>
            </div>
            <div><label className="fld">Base URL</label><input className="inp mono-inp" value={base} onChange={e=>{setBase(e.target.value); persist({base:e.target.value});}} /></div>
            <div><label className="fld">Your user ID</label><input className="inp mono-inp" value={userId} onChange={e=>{setUserId(e.target.value); persist({userId:e.target.value});}} /></div>
            <div><label className="fld">Project ID</label><input className="inp mono-inp" value={projectId} onChange={e=>{setProjectId(e.target.value); persist({projectId:e.target.value});}} /></div>
            <div><label className="fld">Task list ID</label><input className="inp mono-inp" value={taskListId} onChange={e=>{setTaskListId(e.target.value); persist({taskListId:e.target.value});}} /></div>
          </div>
          <div style={{display:'flex',gap:9,flexWrap:'wrap',marginTop:13}}>
            <button className="btn btn-primary" onClick={()=>doParse()}>
              <ion-icon name="flash-outline"></ion-icon>Parse cURL
            </button>
            <button className="btn btn-soft" onClick={()=>{setCurl(SAMPLE_CURL); toast('Sample cURL loaded','info');}}>
              <ion-icon name="sparkles-outline"></ion-icon>Use sample
            </button>
            <button className="btn btn-soft" onClick={()=>{
              saveLS({}); setParsed({cookie:'',csrf:''}); setCapturedAt(null); setCurl('');
              toast('Session forgotten','info');
            }}>
              <ion-icon name="trash-outline"></ion-icon>Forget
            </button>
          </div>
          <div className="chips" style={{marginTop:14}}>
            {authChips.map((c,i) => (
              <span key={i} className={'chip '+(c.ok?'ok':'miss')}>
                <ion-icon name={c.ok?'checkmark-circle':'alert-circle'}></ion-icon>{c.label}
              </span>
            ))}
          </div>
        </section>

        {/* STEP 2 — Choose work-log */}
        <section className="card card-pad">
          <div className="sp-cardhead"><span className="sp-no">2</span><h2>Choose the work-log</h2></div>
          <p className="sp-sub">Pick a saved file, or paste an array of <code>{'{ name, date, hours }'}</code>.</p>

          <div className="sp-files">
            {Object.keys(groups).length === 0 && (
              <div style={{padding:'28px 16px',textAlign:'center',color:'var(--text3)',fontSize:12.5}}>
                <ion-icon name="folder-open-outline" style={{fontSize:28,display:'block',margin:'0 auto 8px',color:'var(--border-strong)'}}></ion-icon>
                No work-logs yet. Run <code style={{fontFamily:'var(--mono)',color:'var(--primary-dark)',background:'var(--primary-light)',padding:'1px 5px',borderRadius:5}}>/update-stats</code> to create one.
              </div>
            )}
            {Object.entries(groups).map(([g, items]) => (
              <div key={g}>
                <div className="sp-fgroup">{g}</div>
                {items.map(w => {
                  const mon = w.date ? MONS[+w.date.slice(5,7)-1] : '—';
                  const day = w.date ? +w.date.slice(8,10) : '?';
                  return (
                    <div key={w.rel} className={'sp-file'+(w.rel===selectedRel?' sel':'')} onClick={()=>pickFile(w)}>
                      <div className="sp-cal">
                        <span className="mon">{mon}</span>
                        <span className="day tnum">{day}</span>
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div className="sp-fdate">{w.valid ? fmtDate(w.date) : 'Invalid file'}</div>
                        <div className="sp-fmeta">
                          {w.valid
                            ? <><b className="tnum">{w.count}</b> task{w.count===1?'':'s'} · <b className="tnum">{(w.hours||0).toFixed(2)}h</b></>
                            : <span style={{color:'var(--error)'}}>could not parse</span>}
                          {' '}<span className="sp-fname">{w.rel.split('/').pop()}</span>
                        </div>
                      </div>
                      {w.pushed
                        ? <span className="pill ok" style={{fontSize:11,padding:'3px 9px',flexShrink:0}}>
                            <ion-icon name="checkmark-circle"></ion-icon>pushed
                          </span>
                        : <button
                            title="Mark as pushed"
                            onClick={async e=>{
                              e.stopPropagation();
                              const ok = await confirm({
                                title: 'Mark as pushed?',
                                body: `This will mark <b>${w.rel.split('/').pop()}</b> as pushed in the file. You can\'t undo this automatically.`,
                                ok: 'Yes, mark done',
                              });
                              if (!ok) return;
                              await markFileDone(w.rel);
                              toast('Marked as pushed ✓','ok');
                            }}
                            style={{background:'none',border:'1px solid var(--border)',borderRadius:7,padding:'3px 8px',cursor:'pointer',fontSize:11,fontWeight:700,color:'var(--text3)',display:'inline-flex',alignItems:'center',gap:4,whiteSpace:'nowrap',flexShrink:0}}
                          >
                            <ion-icon name="checkmark-outline" style={{fontSize:13}}></ion-icon>Mark done
                          </button>}
                      <ion-icon name="chevron-forward-outline" className="sp-go"></ion-icon>
                    </div>
                  );
                })}
              </div>
            ))}
          </div>

          <label className="fld" style={{marginTop:4}}>Or paste work-log JSON
            <button className="btn btn-link" style={{float:'right',marginTop:-2}}
              onClick={()=>{setJsonText(JSON.stringify([{name:'Custom CRM Page — Setup, Hero & Overview',date:todayISO(),hours:'03:30',body:'Setup, Hero & Overview',summary:'- Scaffolded the page route\n- Built the Hero and Overview sections from Figma'}],null,2)); toast('Sample loaded','ok');}}>
              <ion-icon name="sparkles-outline"></ion-icon>Sample
            </button>
          </label>
          <textarea rows={6} value={jsonText} spellCheck={false}
            onChange={e=>setJsonText(e.target.value)}
            placeholder={'[\n  { "name": "Task", "date": "'+todayISO()+'", "hours": "03:30" }\n]'} />
          <div style={{display:'flex',gap:9,flexWrap:'wrap',marginTop:12}}>
            <button className="btn btn-primary" onClick={previewJson}>
              <ion-icon name="eye-outline"></ion-icon>Preview tasks
            </button>
            <button className="btn btn-soft" onClick={()=>{
              try { setJsonText(JSON.stringify(JSON.parse(jsonText),null,2)); toast('Formatted','ok'); }
              catch { toast('Invalid JSON','err'); }
            }}>
              <ion-icon name="code-slash-outline"></ion-icon>Format
            </button>
            <button className="btn btn-soft" onClick={()=>{
              navigator.clipboard && navigator.clipboard.writeText(PROMPT).then(()=>toast('Claude prompt copied','ok'));
            }}>
              <ion-icon name="clipboard-outline"></ion-icon>Copy prompt
            </button>
          </div>
        </section>
      </div>

      {/* STEP 3 — Review & push */}
      {showReview && tasks.length ? (
        <section className="card card-pad sp-review" id="review">
          <div className="sp-reviewhead">
            <div className="sp-cardhead" style={{margin:0}}><span className="sp-no">3</span><h2>Review &amp; push</h2></div>
            <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
              <span className="totchip"><b className="tnum">{tasks.length}</b> task{tasks.length===1?'':'s'}</span>
              <span className="totchip">
                <ion-icon name="time-outline" style={{color:'var(--primary-dark)'}}></ion-icon>
                <b className="tnum">{fmtTotal(totalHours)}</b>
                <span style={{color:'var(--text3)',fontWeight:600,fontSize:11.5}}>({totalHours.toFixed(2)}h)</span>
              </span>
              <button className="btn btn-ghost" onClick={addRow} disabled={pushing}>
                <ion-icon name="add-outline"></ion-icon>Add task
              </button>
            </div>
          </div>
          <p className="sp-sub" style={{marginLeft:38}}>Name, date and hours are editable — fix anything before pushing.</p>

          <div className="tablewrap" style={{marginTop:6}}>
            <table className="tasks">
              <thead>
                <tr>
                  <th style={{width:44}}>#</th>
                  <th>Task</th>
                  <th className="col-date">Date</th>
                  <th className="col-hours">Hours</th>
                  <th className="col-status">Status</th>
                  <th className="col-act"></th>
                </tr>
              </thead>
              <tbody>
                {tasks.map((t,i) => {
                  const ov = overall(i), s = status[i]||{};
                  return (
                    <tr key={i} className={ov==='run'?'pushing':ov==='ok'?'done-row':''}>
                      <td className="idx tnum">{String(i+1).padStart(2,'0')}</td>
                      <td style={{maxWidth:340}}>
                        <input className="cell-inp name" value={t.name} placeholder="Task name"
                          onChange={e=>editCell(i,'name',e.target.value)} />
                        {t.body    ? <span className="bodyhint">{t.body}</span> : null}
                        {t.summary ? <span className="sumhint">{t.summary.replace(/\s*\n\s*/g,'  ·  ').slice(0,110)}{t.summary.length>110?'…':''}</span> : null}
                      </td>
                      <td className="col-date">
                        <input className="cell-inp mono" value={t.date} placeholder="YYYY-MM-DD"
                          onChange={e=>editCell(i,'date',e.target.value)} />
                      </td>
                      <td className="col-hours">
                        <input className="cell-inp mono tnum" value={t.hours}
                          onChange={e=>editCell(i,'hours',e.target.value)} />
                      </td>
                      <td className="col-status">
                        <span className={'pill '+ov}>
                          <ion-icon name={pmeta[ov].i} className={ov==='run'?'spin':''}></ion-icon>
                          {pmeta[ov].l}
                        </span>
                        <div className="steps3">
                          <span className={'step-dot '+(s.create||'')}></span>
                          <span className={'step-dot '+(s.time||'')}></span>
                          <span className={'step-dot '+(s.complete||'')}></span>
                        </div>
                        <div className="steps-lbl">
                          <span>create <b className={s.create}>{s.create==='ok'?'✓':s.create==='run'?'…':'·'}</b></span>
                          <span>time <b className={s.time}>{s.time==='ok'?'✓':s.time==='run'?'…':'·'}</b></span>
                          <span>done <b className={s.complete}>{s.complete==='ok'?'✓':s.complete==='run'?'…':'·'}</b></span>
                        </div>
                      </td>
                      <td className="col-act">
                        <div className="rowacts">
                          <button className="iconbtn-sm push" title="Push this task"
                            disabled={pushing||ov==='ok'} onClick={()=>runPush([i])}>
                            <ion-icon name="rocket-outline"></ion-icon>
                          </button>
                          <button className="iconbtn-sm del" title="Remove" disabled={pushing}
                            onClick={()=>removeRow(i)}>
                            <ion-icon name="trash-outline"></ion-icon>
                          </button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          <div className="sp-pushbar">
            {!connected
              ? <span className="pill err"><ion-icon name="alert-circle"></ion-icon>No active session</span>
              : allDone
              ? <span className="pill ok"><ion-icon name="checkmark-circle"></ion-icon>All tasks pushed</span>
              : <span className="totchip">
                  <ion-icon name="information-circle-outline" style={{color:'var(--primary-dark)'}}></ion-icon>
                  Ready to push <b className="tnum">{tasks.length}</b> tasks
                </span>}
            <div style={{flex:1}}>
              {pushing ? (
                <div className="pushprog"><i style={{width:progress+'%'}}></i></div>
              ) : null}
            </div>
            {pushing ? (
              <button className="btn btn-soft" onClick={cancelPush}>
                <ion-icon name="stop-circle-outline"></ion-icon>Stop
              </button>
            ) : null}
            <button className="btn btn-primary btn-lg" disabled={pushing||allDone}
              onClick={()=>runPush(tasks.map((_,i)=>i))}>
              {pushing
                ? <><ion-icon name="sync-outline" className="spin"></ion-icon>Pushing… {progress}%</>
                : allDone
                ? <><ion-icon name="checkmark-done-outline"></ion-icon>Done</>
                : <><ion-icon name="rocket-outline"></ion-icon>Push to ActiveCollab</>}
            </button>
          </div>
        </section>
      ) : null}

      {/* toasts */}
      <div className="toasts">
        {toasts.map(t => (
          <div key={t.id} className={'toast '+(t.type||'info')}>
            <ion-icon name={t.type==='ok'?'checkmark-circle':t.type==='err'?'alert-circle':'information-circle'}></ion-icon>
            <span>{t.msg}</span>
          </div>
        ))}
      </div>

      {/* confirmation modal */}
      {modal ? (
        <div className="overlay" onClick={e=>{if(e.target===e.currentTarget) closeModal(false);}}>
          <div className="modal" role="dialog" aria-modal="true">
            <div className="modal-head">
              <div className="modal-ic"><ion-icon name="rocket-outline"></ion-icon></div>
              <h3>{modal.title}</h3>
            </div>
            <div className="modal-body">
              <span dangerouslySetInnerHTML={{__html: modal.body}} />
              {modal.items ? (
                <div className="mlist">
                  {modal.items.map((t,i) => (
                    <div className="mlist-row" key={i}>
                      <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.name||'(no name)'}</span>
                      <span className="mh tnum">{(Number(t.hours)||0).toFixed(2)}h</span>
                    </div>
                  ))}
                </div>
              ) : null}
            </div>
            <div className="modal-actions">
              <button className="btn btn-soft" onClick={()=>closeModal(false)}>
                <ion-icon name="close-outline"></ion-icon>Cancel
              </button>
              <button className="btn btn-primary" onClick={()=>closeModal(true)}>
                <ion-icon name="rocket-outline"></ion-icon>{modal.ok||'Push'}
              </button>
            </div>
          </div>
        </div>
      ) : null}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
