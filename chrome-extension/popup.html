<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  :root {
    --bg: #F0F4F8; --card: #fff; --text: #0D1526; --text2: #475569; --text3: #94A3B8;
    --border: #E2E8F0; --primary: #18B6D9; --primary-dark: #0E7490; --primary-light: #ECFEFF;
    --ok: #16A34A; --ok-bg: #F0FDF4; --err: #DC2626; --err-bg: #FEF2F2;
    --warn: #D97706; --warn-bg: #FFFBEB;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --shadow: 0 1px 3px rgba(13,21,38,.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font); background: var(--bg); color: var(--text);
    width: 300px; min-height: 200px; padding: 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* header */
  .head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .logo {
    width: 36px; height: 36px; border-radius: 10px; flex: none;
    background: linear-gradient(150deg,#5FD3EE,#18B6D9,#0E7490);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #fff; box-shadow: var(--shadow);
  }
  .head-text h1 { font-size: 14px; font-weight: 800; letter-spacing: -.3px; }
  .head-text p  { font-size: 11px; color: var(--text3); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-top: 1px; }

  /* status badge */
  .status {
    display: flex; align-items: center; gap: 8px;
    border-radius: 10px; padding: 10px 12px; margin-bottom: 12px;
    font-size: 12.5px; font-weight: 700;
    border: 1px solid var(--border); background: var(--card);
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .status.ok   { border-color: #BBF7D0; background: var(--ok-bg); color: var(--ok); }
  .status.err  { border-color: #FECACA; background: var(--err-bg); color: var(--err); }
  .status.checking { border-color: var(--border); background: #fff; color: var(--text3); }
  .status.ok   .dot { background: var(--ok); box-shadow: 0 0 0 3px rgba(22,163,74,.2); }
  .status.err  .dot { background: var(--err); }
  .status.checking .dot { background: var(--text3); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* buttons */
  .btns { display: flex; flex-direction: column; gap: 8px; }
  button {
    font-family: var(--font); width: 100%; border-radius: 10px; cursor: pointer;
    font-weight: 700; font-size: 13px; padding: 10px 14px; border: 0;
    display: flex; align-items: center; gap: 8px; transition: all .12s;
  }
  button:active { transform: translateY(1px); }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-primary:disabled { opacity: .45; cursor: not-allowed; transform: none; }
  .btn-ghost { background: #fff; border: 1px solid var(--border); color: var(--text2); }
  .btn-ghost:hover { border-color: var(--primary); color: var(--primary-dark); background: var(--primary-light); }
  .btn-ghost:disabled { opacity: .45; cursor: not-allowed; }
  .icon { font-size: 16px; flex: none; }

  /* hint */
  .hint {
    margin-top: 12px; padding: 10px 12px; border-radius: 9px;
    background: var(--warn-bg); border: 1px solid #FDE68A;
    font-size: 11.5px; color: var(--warn); font-weight: 600; line-height: 1.5;
  }
  .hint code { font-family: monospace; font-size: 11px; background: rgba(0,0,0,.06); padding: 1px 4px; border-radius: 4px; }

  /* port row */
  .port-row { display: flex; gap: 6px; margin-bottom: 12px; align-items: center; }
  .port-row input {
    flex: 1; height: 32px; padding: 0 10px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 12.5px; background: #fff; color: var(--text);
    font-family: monospace;
  }
  .port-row input:focus { outline: none; border-color: var(--primary); }
  .port-row label { font-size: 11px; font-weight: 700; color: var(--text3); white-space: nowrap; }

  .kbd { font-size: 10.5px; color: var(--text3); text-align: center; margin-top: 10px; }
  .kbd kbd { background: var(--border); border-radius: 4px; padding: 1px 5px; font-family: monospace; font-size: 10px; }
</style>
</head>
<body>
  <div class="head">
    <div class="logo">🚀</div>
    <div class="head-text">
      <h1>Work-log Pusher</h1>
      <p>Monarch Innovation</p>
    </div>
  </div>

  <div class="port-row">
    <label>PORT</label>
    <input id="portInput" type="number" value="5050" min="1024" max="65535" title="Server port" />
  </div>

  <div class="status checking" id="statusBadge">
    <div class="dot"></div>
    <span id="statusText">Checking server…</span>
  </div>

  <div class="btns">
    <button class="btn-primary" id="btnOpen" disabled>
      <span class="icon">📋</span> Open Work-log Pusher
    </button>
    <button class="btn-ghost" id="btnFigma" disabled>
      <span class="icon">🎨</span> Figma Changes
    </button>
  </div>

  <div class="hint" id="hint" style="display:none">
    Server not running. Start it first:<br>
    Double-click <code>START.bat</code> or run <code>npm start</code> in the project folder,
    then click 🔄 below.
    <br><br>
    <button class="btn-ghost" id="btnRetry" style="margin-top:4px;width:100%;padding:7px 12px;font-size:12px;">
      🔄 Check again
    </button>
  </div>

  <div class="kbd">Shortcut: <kbd>Alt</kbd>+<kbd>Shift</kbd>+<kbd>W</kbd></div>

<script src="popup.js"></script>
</body>
</html>
